name-template: 'v$BRANCH_NAME'
tag-template: 'v$BRANCH_NAME'

categories:
  - title: '馃殌 Features'
    labels:
      - 'feat'
      - 'task'
      - 'chore'
  - title: '馃悰 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: patch

autolabeler:
  - label: 'fix'
    title:
      - '/fix:/i'

  - label: 'feat'
    title:
      - '/feat:/i'

  - label: 'task'
    title:
      - '/task:/i'

template: |
  ## Changes

  $CHANGES